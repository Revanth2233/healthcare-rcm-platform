name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: "8.0.x" }
      - run: dotnet restore src/HealthcareRCM.API/HealthcareRCM.API.csproj
      - run: dotnet build src/HealthcareRCM.API/HealthcareRCM.API.csproj --no-restore
      - run: dotnet test tests/HealthcareRCM.Tests/ --verbosity normal
